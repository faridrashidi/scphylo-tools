name: CI

on:
  schedule:
    - cron: 00 00 * * 1 # run every Monday at 00:00
  push:
    branches:
      - main
      - dev
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  init:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.ci-skip-step.outputs.ci-skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: ci-skip-step
        run: |
          msg=$(git log -1 --pretty=%B)
          skip="false"
          if [[ "$msg" == *"[ci skip]"* ]] || [[ "$msg" == *"[ci-skip]"* ]] || [[ "$msg" == *"[skip ci]"* ]] || [[ "$msg" == *"[skip-ci]"* ]]; then
              skip="true"
          fi
          echo "ci-skip=$skip" >> "$GITHUB_OUTPUT"

  lint:
    needs: init
    if: ${{ github.event_name == 'schedule' || needs.init.outputs.skip == 'false' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.73.0
          manifest-path: pyproject.toml
          environments: lint
          cache: true
          locked: true
      - name: Run static analysis
        run: pixi run --locked -e lint lint

  docs:
    needs: init
    if: ${{ github.event_name == 'schedule' || needs.init.outputs.skip == 'false' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.73.0
          manifest-path: pyproject.toml
          environments: docs
          cache: true
          locked: true
      - name: Build documentation with warnings as errors
        run: pixi run --locked -e docs docs

  test:
    needs: lint
    name: test ${{ matrix.environment }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        environment: [py311, py312, py313]
        os: [ubuntu-latest, macos-latest]
        include:
          - environment: py311
            os: macos-15-intel
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.73.0
          manifest-path: pyproject.toml
          environments: ${{ matrix.environment }}
          cache: true
          locked: true
      - name: Unit tests
        run: pixi run --locked -e ${{ matrix.environment }} test

  codeql:
    needs: lint
    name: code quality
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: +security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  build_wheels:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    needs: test
    name: build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        os: [ubuntu-latest, macos-latest, macos-15-intel]
    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    needs: build_wheels
    name: build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.73.0
          manifest-path: pyproject.toml
          environments: lint
          cache: true
          locked: true
      - name: Build sdist
        run: pixi run --locked -e lint python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  deploy:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    needs: [test, build_wheels, build_sdist]
    runs-on: ubuntu-latest
    steps:
      - name: Artifact
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish wheels to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: dist/
          skip-existing: true
          verbose: true
